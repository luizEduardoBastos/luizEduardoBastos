    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .social-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .social-link {
            display: inline-block;
            text-decoration: none;
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .social-link:hover {
            transform: scale(1.05);
        }

        .social-link img {
            display: block;
            border: none;
            outline: none;
            height: 40px;
            width: auto;
        }

        /* Remover sublinhado de links */
        a {
            text-decoration: none;
            color: inherit;
        }

        a:visited {
            color: inherit;
        }

        a:hover {
            text-decoration: none;
        }
    </style>
</head>
